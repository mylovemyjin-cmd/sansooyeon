body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;background:#f5f5f5;}
button,input,textarea{font-family:inherit;}

.lg-em{font-size:48px;margin-bottom:12px;}

.g-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;border-radius:12px;border:2px solid #e0e0e0;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#333;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.08);}

.h-acts{display:flex;gap:6px;align-items:center;flex-shrink:0;}

.rb{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700;flex-shrink:0;}

.mc{background:#fff;border-radius:14px;overflow:hidden;border:2px solid var(--br);box-shadow:0 3px 12px rgba(0,0,0,.06);margin-bottom:13px;}

.mn{font-size:13px;font-weight:600;color:#333;}

.rs{border:1.5px solid var(--br);border-radius:8px;padding:4px 6px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;outline:none;}

/* 초대 링크 버튼 */
.lnkb{width:100%;padding:10px;background:linear-gradient(135deg,var(--gr),#6B9E4A);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:7px;}

<body>
<div id="inapp">
  <div class="inapp-box">
    <div style="font-size:44px;margin-bottom:10px">⚠️</div>
    <h2>외부 브라우저 필요</h2>
    <p>카카오톡에서는 Google 로그인이 차단됩니다.<br>Chrome에서 열어주세요.</p>
    <button class="ob-btn" onclick="openBrowser()">🌐 Chrome으로 열기</button>
    <button class="cp-btn" onclick="copyUrl()">🔗 주소 복사하기</button>
  </div>
</div>
<div id="login">
  <div class="login-box">
    <div class="lg-em">📋</div>
    <div class="lg-ti">체크리스트</div>
    <div id="inv-notice" class="lg-inv"></div>
    <div class="lg-sb">Google 계정으로 시작하세요</div>

        +"</div></div>"
        +"<div class='ibtns'>"
        +"<button class='ibtn' onclick='edIt(\""+sid+"\",\""+iid+"\")' title='수정'>✏️</button>"
        +"<button class='ibtn' onclick='delIt(\""+sid+"\",\""+iid+"\")' title='삭제'>🗑️</button>"
        +"</div>"
        +"</div>";
    }).join("");
    return"<div class='sc'>"
      +"<div class='shd' style='background:linear-gradient(135deg,"+s.color+"18,"+s.color+"08)'>"
      +"<span class='st' style='color:"+s.color+"'>"+esc(s.title)+"</span>"
      +"<span class='sb' style='background:"+s.color+"'>"+sd+"/"+its.length+"</span>"
      +(sc2>0?"<span class='scb2'>"+fmt(sc2)+"원</span>":"")
      +"<div class='seb'>"
      +"<button class='ibtn' onclick='edSec(\""+s.id+"\")'>✏️</button>"
      +"<button class='ibtn' onclick='delSec(\""+s.id+"\")'>🗑️</button>"
      +"</div>"
      +"</div>"
      +ihtml
      +"<div class='addr'>"
      +"<input class='ainp' id='ni_"+s.id+"' placeholder='새 항목 추가' onkeydown='if(event.key===\"Enter\")addIt(\""+s.id+"\")'>"
      +"<button class='abtn' style='background:"+s.color+"' onclick='addIt(\""+s.id+"\")'>추가</button>"
      +"</div>"
      +"</div>";
  }).join("");
  document.getElementById("secs").innerHTML=h;
}

function findIt(sid,iid){var s=secs.find(function(s){return s&&s.id===sid;});if(!s||!s.items)return null;return s.items.find(function(i){return i&&i.id===iid;})||null;}
function togIt(sid,iid){if(!canEd())return;var it=findIt(sid,iid);if(!it)return;it.done=!it.done;var w=who(),a=ts();it.updatedBy=w;it.updatedAt=a;addHist(it,{type:"check",value:it.done,who:w,at:a});saveSecs();}
function setAss(sid,iid,v){var it=findIt(sid,iid);if(!it)return;var pv=it.assignee||"";it.assignee=v;var w=who();it.updatedBy=w;if(pv!==v)addHist(it,{type:"assignee",prev:pv,value:v,who:w,at:ts()});}
function setCst(sid,iid,v){var raw=v.replace(/[^0-9]/g,"");var it=findIt(sid,iid);if(!it)return;var pv=it.cost||"";it.cost=raw;var w=who();it.updatedBy=w;if(pv!==raw)addHist(it,{type:"cost",prev:pv,value:raw,who:w,at:ts()});}
function delIt(sid,iid){if(!canEd())return;var s=secs.find(function(s){return s&&s.id===sid;});if(!s)return;s.items=s.items.filter(function(i){return i&&i.id!==iid;});saveSecs();}
function addIt(sid){if(!canEd())return;var inp=document.getElementById("ni_"+sid);var txt=inp.value.trim();if(!txt)return;var s=secs.find(function(s){return s&&s.id===sid;});if(!s)return;if(!s.items)s.items=[];var w=who(),a=ts();s.items.push({id:uid(),text:txt,done:false,assignee:"",cost:"",history:[{type:"add",who:w,at:a}],updatedBy:w,updatedAt:a});inp.value="";saveSecs();}
function addSec(){if(!canEd())return;secs.push({id:uid(),title:"새 섹션",color:COLORS[secs.length%COLORS.length],items:[]});saveSecs();}
function delSec(sid){if(!isAdm())return;if(!confirm("섹션을 삭제할까요?"))return;secs=secs.filter(function(s){return s&&s.id!==sid;});saveSecs();}
function edIt(sid,iid){var it=findIt(sid,iid);if(!it)return;document.getElementById("mtt").textContent="항목 수정";document.getElementById("minp").value=it.text;document.getElementById("cwrap").style.display="none";mcb=function(){var t=document.getElementById("minp").value.trim();if(t&&t!==it.text){var w=who(),a=ts();addHist(it,{type:"edit",value:t,who:w,at:a});it.text=t;it.updatedBy=w;it.updatedAt=a;}saveSecs();clModal();};opModal();}
function edSec(sid){var s=secs.find(function(s){return s&&s.id===sid;});if(!s)return;document.getElementById("mtt").textContent="섹션 수정";document.getElementById("minp").value=s.title;document.getElementById("cwrap").style.display="block";sc=s.color;renCds();mcb=function(){var t=document.getElementById("minp").value.trim();if(t)s.title=t;s.color=sc;saveSecs();clModal();};opModal();}
function renCds(){document.getElementById("cds").innerHTML=COLORS.map(function(c){return"<div class='cd"+(c===sc?" sl":"")+"' style='background:"+c+"' onclick='sc=\""+c+"\";renCds()'></div>";}).join("");}
function opModal(){document.getElementById("modal").classList.add("open");setTimeout(function(){document.getElementById("minp").focus();},60);}
function doSave(){if(mcb)mcb();}
function clModal(){document.getElementById("modal").classList.remove("open");}
function togEd(){em=!em;document.body.classList.toggle("em",em);var b=document.getElementById("etg");b.textContent=em?"✔ 편집 완료":"✏️ 편집";b.classList.toggle("on",em);document.getElementById("clh").textContent=em?"✏️ 항목 수정·삭제, 담당자·비용 입력, 섹션 추가 가능":"💡 항목 텍스트를 클릭하면 변경 이력을 볼 수 있어요";}
function setTab(t){["cl","bg","nt","mb"].forEach(function(id){document.getElementById("tab-"+id).style.display=t===id?"":"none";});document.querySelectorAll(".tb").forEach(function(b,i){b.classList.toggle("active",["cl","bg","nt","mb"][i]===t);});if(t==="bg")renBg();if(t==="nt"){var ta=document.getElementById("nta");if(ta)ta.value=ntv;}if(t==="mb")renMb();}

function renBg(){var gd=0;var h=secs.filter(Boolean).map(function(s){if(!s)return"";var its=(s.items||[]).filter(Boolean);var st=its.reduce(function(a,i){return a+Number(i.cost||0);},0);gd+=st;return"<div class='bcard'><div class='bsh' style='color:"+esc(s.color)+";background:linear-gradient(135deg,"+esc(s.color)+"18,"+esc(s.color)+"08)'>"+esc(s.title)+"</div>"+its.map(function(it){return"<div class='br2'><span class='bn"+(it.done?" dn":"")+"'>"+esc(it.text)+"</span>"+(it.assignee?"<span class='ba'>👤 "+esc(it.assignee)+"</span>":"")+(it.cost&&Number(it.cost)>0?"<span class='bc'>"+fmt(it.cost)+"원</span>":"<span class='bno'>미입력</span>")+"</div>";}).join("")+(st>0?"<div class='bst'><span>소계</span><span>"+fmt(st)+"원</span></div>":"")+  "</div>";}).join("");document.getElementById("bgc").innerHTML="<div class='gb'><div><div class='gl'>💰 총 예상 비용</div><div class='gs'>입력된 항목 기준</div></div><div class='ga'>"+fmt(gd)+"원</div></div>"+h;}
function saveNt(){ntv=document.getElementById("nta").value;if(!pid)return;db.ref("projects/"+pid+"/notes").set(ntv);showToast("메모 저장 완료 ✓");}

function renMb(){
  if(!pid||!isAdm())return;
  var lnkBox="<div class='lnk-box' id='lnk-box' style='display:none'>"
    +"<p>🔗 아래 링크를 복사해서 공유하세요 (7일간 유효)</p>"
    +"<input class='lnk-txt' id='lnk-val' readonly>"
    +"<button class='lnk-cp' onclick='copyInvLink()'>📋 링크 복사</button>"
    +"</div>";
  db.ref("projects/"+pid+"/members").once("value",function(snap){
    var ms=snap.val()||{};
    var rows=Object.keys(ms).map(function(k){var m=ms[k];var email=m.email||ke(k);var isMe=k===ekey;var init=(m.name||email).charAt(0).toUpperCase();
      return"<div class='mrow'>"
        +(m.photoURL?"<img class='mav' src='"+esc(m.photoURL)+"'>":"<div class='mavp'>"+esc(init)+"</div>")
        +"<div class='mi'><div class='mn'>"+esc(m.name||email)+(isMe?" <span style='font-size:10px;color:#aaa'>(나)</span>":"")+"</div><div class='me'>"+esc(email)+"</div></div>"
        +(isMe?"<span class='rb rb-"+m.role+"'>"+RKO[m.role]+"</span>"
          :"<select class='rs' onchange='chRole(\""+k+"\",this.value)'>"
            +["admin","editor","viewer"].map(function(r){return"<option value='"+r+"\'"+(m.role===r?" selected":"")+">"+RKO[r]+"</option>";}).join("")
          +"</select>"
          +"<button class='rmb' onclick='rmMb(\""+k+"\")'>✕</button>")
        +"</div>";
    }).join("");
    db.ref("projects/"+pid+"/invites").once("value",function(is){
      var ivs=is.val()||{};
      var pr=Object.keys(ivs).map(function(k){return"<div class='pnd'><span>⏳ "+esc(ke(k))+"</span><button class='pndc' onclick='canInv(\""+k+"\")'>취소</button></div>";}).join("");
      document.getElementById("mbc").innerHTML=
        "<div class='mc'><div class='mh'>👥 멤버 ("+Object.keys(ms).length+")</div>"+rows+(pr?"<div style='padding:8px 0 4px 15px;font-size:11px;color:#aaa'>초대 대기</div>"+pr:"")+"</div>"
        +"<div class='mc'><div class='mh'>🔗 초대 링크 생성</div>"
        +"<div class='iw'>"
        +"<div class='rr'>"
        +"<label><input type='radio' name='lnkr' value='editor' checked> "+RKO["editor"]+"</label>"
        +"<label><input type='radio' name='lnkr' value='viewer'> "+RKO["viewer"]+"</label>"
        +"</div>"
        +"<button class='lnkb' onclick='genInvLink(document.querySelector(\"input[name=lnkr]:checked\").value)'>🔗 초대 링크 만들기</button>"
        +lnkBox
        +"</div></div>"
        +"<div class='mc'><div class='mh'>📧 이메일로 초대</div>"
        +"<div class='iw'>"
        +"<input class='ii' id='iie' type='email' placeholder='초대할 이메일 주소'/>"
        +"<div class='rr'>"
        +"<label><input type='radio' name='ivr' value='editor' checked> "+RKO["editor"]+"</label>"
        +"<label><input type='radio' name='ivr' value='viewer'> "+RKO["viewer"]+"</label>"
        +"</div>"
        +"<button class='invb' onclick='invMb()'>이메일 초대</button>"
        +"</div></div>";
    });
  });
}

function chRole(k,r){db.ref("projects/"+pid+"/members/"+k+"/role").set(r);showToast("권한 변경됨 ✓");}
function rmMb(k){if(!confirm("멤버를 제거할까요?"))return;db.ref("projects/"+pid+"/members/"+k).remove();showToast("멤버 제거됨");setTimeout(renMb,400);}
function invMb(){var email=(document.getElementById("iie").value||"").trim().toLowerCase();if(!email||!email.includes("@")){showToast("올바른 이메일을 입력하세요");return;}var r=document.querySelector("input[name='ivr']:checked");var role=r?r.value:"editor";var k=ek(email);db.ref("projects/"+pid+"/members/"+k).set({email:email,role:role,name:email,photoURL:""});db.ref("projects/"+pid+"/invites/"+k).set({email:email,role:role,invitedBy:cu.email,at:ts()});showToast("초대 완료 ✓ — 상대방이 로그인하면 자동 합류");document.getElementById("iie").value="";setTimeout(renMb,600);}
function canInv(k){db.ref("projects/"+pid+"/invites/"+k).remove();db.ref("projects/"+pid+"/members/"+k).remove();showToast("초대 취소됨");setTimeout(renMb,400);}

function openNP(){se="📋";snc="#C8860A";document.getElementById("npname").value="";document.getElementById("emrow").innerHTML=EMOJIS.map(function(e){return"<div class='eo"+(e==="📋"?" sl":"")+"' onclick='se=\""+e+"\";document.querySelectorAll(\".eo\").forEach(function(el){el.classList.toggle(\"sl\",el.textContent.trim()===se);})'>" +e+"</div>";}).join("");document.getElementById("colrow").innerHTML=COLORS.map(function(col){return"<div class='co"+(col===snc?" sl":"")+"' style='background:"+col+"' onclick='snc=\""+col+"\";document.querySelectorAll(\".co\").forEach(function(el){el.classList.toggle(\"sl\",el.style.background===snc);});'></div>";}).join("");document.getElementById("npmodal").classList.add("open");setTimeout(function(){document.getElementById("npname").focus();},60);}
function clNP(){document.getElementById("npmodal").classList.remove("open");}
function crProj(){var n=document.getElementById("npname").value.trim();if(!n){showToast("프로젝트 이름을 입력하세요");return;}var k=uid();var ekey2=ek(cu.email);var ms={};ms[ekey2]={email:cu.email,name:cu.displayName||cu.email,photoURL:cu.photoURL||"",role:"admin"};var p={id:k,name:n,emoji:se,color:snc,createdAt:ts(),createdBy:cu.email,members:ms,sections:[{id:uid(),title:"📅 할 일",color:snc,items:[]},{id:uid(),title:"✅ 완료",color:"#556B2F",items:[]}],notes:""};db.ref("projects/"+k).set(p,function(e){if(!e){showToast("프로젝트 생성됨 ✓");clNP();}else showToast("오류: "+(e.message||""));});}
function edProj(k){db.ref("projects/"+k+"/name").once("value",function(snap){document.getElementById("mtt").textContent="프로젝트 이름 변경";document.getElementById("minp").value=snap.val()||"";document.getElementById("cwrap").style.display="none";mcb=function(){var t=document.getElementById("minp").value.trim();if(t)db.ref("projects/"+k+"/name").set(t);clModal();showToast("이름 변경됨 ✓");};opModal();});}
function delProj(k){if(!confirm("프로젝트를 삭제할까요? 모든 데이터가 삭제됩니다."))return;db.ref("projects/"+k).remove();showToast("프로젝트 삭제됨");}

function opHist(sid,iid){var s=secs.find(function(s){return s&&s.id===sid;});var it=findIt(sid,iid);if(!it)return;document.getElementById("htin").textContent=it.text;document.getElementById("hse").textContent=s?s.title:"";var hist=it.history||[];document.getElementById("hby").innerHTML=!hist.length?"<div class='hem'>아직 변경 이력이 없어요</div>":hist.map(function(h){var dot="#C8860A",ac="";if(h.type==="check"){dot=h.value?"#556B2F":"#aaa";ac=h.value?"✅ 완료로 변경":"☐ 미완료로 변경";}else if(h.type==="assignee"){dot="#2B6CB0";ac="👤 담당자: "+(h.prev||"없음")+" → "+(h.value||"없음");}else if(h.type==="cost"){dot="#8B4513";ac="💴 비용: "+(h.prev?fmt(h.prev)+"원":"없음")+" → "+(h.value?fmt(h.value)+"원":"없음");}else if(h.type==="add"){dot="#556B2F";ac="➕ 항목 추가됨";}else if(h.type==="edit"){dot="#6B46C1";ac="✏️ 항목명 수정: "+esc(h.value);}return"<div class='hen'><div class='hdt' style='background:"+dot+"'></div><div><div class='hac'>"+ac+"</div><div class='hmt'><span class='hwh'>"+esc(h.who)+"</span> · "+esc(h.at)+"</div></div></div>";}).join("");document.getElementById("hov").classList.add("open");}
function clHist(){document.getElementById("hov").classList.remove("open");}
</script>
</body>
</html>
